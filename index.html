  if (!house) return ALL_ROOMS.slice(0, 4);
  const ids = new Set(["kitchen", "living", "bedroom", "bathroom"]);
  const bedrooms = house.bedrooms || 3;
  const area = house.area || 150;
  const features = house.features || [];
  if (bedrooms >= 3) { ids.add("guest"); ids.add("kidsroom"); }
  if (area >= 130) ids.add("balcony");
  if (features.some((f) => f.includes("حديقة"))) ids.add("garden");
  if (bedrooms >= 5 || house.id === "palace") ids.add("library");
  return ALL_ROOMS.filter((r) => ids.has(r.id));
}

function useSound() {
  const ctxRef = useRef(null);
  const enabledRef = useRef(true);
  const musicTimerRef = useRef(null);

  const getCtx = () => {
    if (!ctxRef.current) {
      const AC = window.AudioContext || window.webkitAudioContext;
      ctxRef.current = new AC();
    }
    return ctxRef.current;
  };

  const tone = (freq, dur, type = "sine", vol = 0.15, delay = 0) => {
    if (!enabledRef.current) return;
    try {
      const ctx = getCtx();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = type;
      o.frequency.value = freq;
      o.connect(g);
      g.connect(ctx.destination);
      const t0 = ctx.currentTime + delay;
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      o.start(t0);
      o.stop(t0 + dur + 0.02);
    } catch (e) { /* audio unavailable */ }
  };

  const sounds = {
    cash: () => { tone(700, 0.09, "square", 0.12); tone(1100, 0.12, "square", 0.12, 0.09); },
    splash: () => { tone(300, 0.15, "sawtooth", 0.08); tone(180, 0.2, "sawtooth", 0.06, 0.05); },
    door: () => { tone(260, 0.08, "triangle", 0.1); tone(160, 0.12, "triangle", 0.08, 0.07); },
    click: () => tone(600, 0.05, "sine", 0.08),
    buzz: () => tone(140, 0.15, "sawtooth", 0.1),
    ride: () => { tone(200, 0.1, "sawtooth", 0.1); tone(400, 0.15, "sawtooth", 0.08, 0.1); },
    chime: () => { tone(880, 0.12, "sine", 0.1); tone(1320, 0.18, "sine", 0.08, 0.12); },
  };

  const setEnabled = (v) => { enabledRef.current = v; };

  const startMusic = () => {
    if (musicTimerRef.current) return;
    const notes = [523, 659, 784, 659, 523, 440];
    let i = 0;
    musicTimerRef.current = setInterval(() => {
      if (enabledRef.current) tone(notes[i % notes.length], 0.5, "sine", 0.035);
      i++;
    }, 700);
  };
  const stopMusic = () => {
    if (musicTimerRef.current) { clearInterval(musicTimerRef.current); musicTimerRef.current = null; }
  };

  useEffect(() => () => stopMusic(), []);

  return { sounds, setEnabled, startMusic, stopMusic };
}

function QuizGame({ pool, rounds, payPerCorrect, sounds, onFinish }) {
  const [qs] = useState(() => shuffleArray(pool).slice(0, rounds));
  const [idx, setIdx] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [selected, setSelected] = useState(null);
  const scoreRef = useRef(0);
  const current = qs[idx];

  const pick = (opt) => {
    if (feedback) return;
    const correct = opt === current.answer;
    setSelected(opt);
    setFeedback(correct ? "correct" : "wrong");
    if (correct) { scoreRef.current += 1; sounds.chime(); } else { sounds.buzz(); }
    setTimeout(() => {
      if (idx + 1 < qs.length) { setIdx((i) => i + 1); setFeedback(null); setSelected(null); }
      else onFinish(scoreRef.current * payPerCorrect, scoreRef.current, qs.length);
    }, 800);
  };

  return (
    <div className="space-y-3 text-center">
      <p className="text-base text-[#AAAAAA]">سؤال {idx + 1} من {qs.length}</p>
      <p className="font-bold text-[#F5F5F5] text-2xl leading-relaxed">{current.q}</p>
      <div className="grid grid-cols-2 gap-2">
        {current.options.map((opt) => {
          let cls = "border-2 border-[#333333]";
          if (feedback && opt === current.answer) cls = "border-2 border-green-500 bg-green-900/30";
          else if (feedback && opt === selected) cls = "border-2 border-red-400 bg-red-900/30";
          return (
            <button key={opt} disabled={!!feedback} onClick={() => pick(opt)}
              className={`py-2.5 rounded-xl font-semibold text-[#F5F5F5] transition-all ${cls}`}>
              {opt}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------------------------- لعبة تقديم الطلبات (شغل بمطعم/كافيه) ---------------------------------- */

function ServeGame({ items, rounds, timeLimit, sounds, onFinish }) {
  const [seq] = useState(() => Array.from({ length: rounds }, () => items[Math.floor(Math.random() * items.length)]));
  const [idx, setIdx] = useState(0);
  const [timeLeft, setTimeLeft] = useState(timeLimit);
  const [feedback, setFeedback] = useState(null);
  const [selected, setSelected] = useState(null);
  const earnedRef = useRef(0);
  const answeredRef = useRef(false);
  const current = seq[idx];

  const choices = useMemo(() => {
    const others = items.filter((it) => it[0] !== current[0]).map((it) => it[0]);
    const picks = shuffleArray(others).slice(0, Math.min(3, others.length));
    return shuffleArray([current[0], ...picks]);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [idx]);

  const handleAnswer = (opt) => {
    if (answeredRef.current) return;
    answeredRef.current = true;
    const correct = opt === current[0];
    setSelected(opt);
    setFeedback(correct ? "correct" : "wrong");
    if (correct) { earnedRef.current += current[1]; sounds.cash(); } else { sounds.buzz(); }
    setTimeout(() => {
      if (idx + 1 < seq.length) setIdx((i) => i + 1);
      else onFinish(earnedRef.current, seq.length);
    }, 700);
  };

  useEffect(() => {
    answeredRef.current = false;
    setTimeLeft(timeLimit);
    setFeedback(null);
    setSelected(null);
    const timer = setInterval(() => {
      setTimeLeft((t) => {
        if (t <= 1) { clearInterval(timer); handleAnswer(null); return 0; }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [idx]);

  return (
    <div className="space-y-3 text-center">
      <p className="text-base text-[#AAAAAA]">طلب {idx + 1} من {seq.length}</p>
      <div className="w-full h-2 bg-[#2A2A2A] rounded-full overflow-hidden">
        <div className="h-full bg-[#F4A261] transition-all" style={{ width: `${(timeLeft / timeLimit) * 100}%` }} />
      </div>
      <p className="font-bold text-[#F5F5F5] text-2xl">🧑‍🍳 الزبون يريد: {current[0]}</p>
      <div className="grid grid-cols-2 gap-2">
        {choices.map((opt) => {
          let cls = "border-2 border-[#333333]";
          if (feedback && opt === current[0]) cls = "border-2 border-green-500 bg-green-900/30";
          else if (feedback && opt === selected) cls = "border-2 border-red-400 bg-red-900/30";
          return (
            <button key={opt} disabled={!!feedback} onClick={() => handleAnswer(opt)}
              className={`py-2.5 rounded-xl font-semibold text-[#F5F5F5] transition-all ${cls}`}>
              {opt}
            </button>
          );
        })}
      </div>
    </div>
  );
}

const DELIVERY_SOURCES = ["مطعم", "كافيه", "سوبر ماركت"];

    "مطعم": SHOPS.restaurant.items.map((i) => i[0]),

    "سوبر ماركت": SHOPS.supermarket.items.map((i) => i[0]),
  };
  const [seq] = useState(() => Array.from({ length: rounds }, () => {
    const source = DELIVERY_SOURCES[Math.floor(Math.random() * DELIVERY_SOURCES.length)];
    const item = itemPool[source][Math.floor(Math.random() * itemPool[source].length)];
    const houseNumber = 100 + Math.floor(Math.random() * 900);
    return { source, item, houseNumber, basePay: 18 };
  }));
  const [idx, setIdx] = useState(0);
  const [timeLeft, setTimeLeft] = useState(timeLimit);
  const [feedback, setFeedback] = useState(null);
  const [lastPay, setLastPay] = useState(0);
  const earnedRef = useRef(0);
  const answeredRef = useRef(false);
  const current = seq[idx];

  const finishRound = (pay) => {
    if (answeredRef.current) return;
    answeredRef.current = true;
    earnedRef.current += pay;
    setLastPay(pay);
    setFeedback(pay > 0 ? "done" : "missed");
    if (pay > 0) sounds.cash(); else sounds.buzz();
    setTimeout(() => {
      if (idx + 1 < seq.length) setIdx((i) => i + 1);
      else onFinish(earnedRef.current, seq.length);
    }, 700);
  };

  const handleDeliver = () => {
    const bonus = Math.round((timeLeft / timeLimit) * 35);
    finishRound(current.basePay + bonus);
  };

  useEffect(() => {
    answeredRef.current = false;
    setTimeLeft(timeLimit);
    setFeedback(null);
    const timer = setInterval(() => {
      setTimeLeft((t) => {
        if (t <= 1) { clearInterval(timer); finishRound(0); return 0; }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [idx]);

  return (
    <div className="space-y-3 text-center">
      <p className="text-base text-[#AAAAAA]">توصيلة {idx + 1} من {seq.length}</p>
      <div className="w-full h-2 bg-[#2A2A2A] rounded-full overflow-hidden">
        <div className="h-full bg-[#F4A261] transition-all" style={{ width: `${(timeLeft / timeLimit) * 100}%` }} />
      </div>
      <p className="font-bold text-[#F5F5F5]">📦 طلب من {current.source}: {current.item}</p>
      <p className="text-base text-[#AAAAAA]">وصّله لمنزل رقم <span className="font-bold text-[#F5F5F5]">#{current.houseNumber}</span> بأسرع وقت لأعلى إكرامية</p>
      {feedback ? (
        <p className={`font-bold ${feedback === "done" ? "text-green-600" : "text-red-500"}`}>
          {feedback === "done" ? `وصلت! ربحت ${lastPay}$ 🛵` : "طفشت الطلب 😅"}
        </p>
      ) : (

/* ---------------------------------- مطعم الأندومي (تحضير خطوة بخطوة) ---------------------------------- */

const NOODLE_TYPES = ["باكيت", "كوب"];
const NOODLE_COLORS = ["أبيض", "أحمر", "أزرق", "أسود", "وردي"];
const NOODLE_CUSTOMERS = ["آسيا", "سارة", "خالد", "نورة", "فهد", "أبو تركي", "أم فهد"];

function NoodleGame({ rounds, timeLimit, sounds, onFinish }) {
  const [seq] = useState(() => Array.from({ length: rounds }, () => ({
    type: NOODLE_TYPES[Math.floor(Math.random() * NOODLE_TYPES.length)],
    color: NOODLE_COLORS[Math.floor(Math.random() * NOODLE_COLORS.length)],
    customer: NOODLE_CUSTOMERS[Math.floor(Math.random() * NOODLE_CUSTOMERS.length)],
  })));
  const [idx, setIdx] = useState(0);
  const [step, setStep] = useState(0);
  const [timeLeft, setTimeLeft] = useState(timeLimit);
  const [feedback, setFeedback] = useState(null);
  const [lastPay, setLastPay] = useState(0);
  const earnedRef = useRef(0);
  const doneRef = useRef(false);
  const current = seq[idx];
  const correctLabel = `باكيت اندومي ${current.type === "كوب" ? "(كوب) " : ""}${current.color}`;

  const packetChoices = useMemo(() => {
    const opts = new Set([correctLabel]);
    while (opts.size < 4) {
      const t = NOODLE_TYPES[Math.floor(Math.random() * NOODLE_TYPES.length)];
      const c = NOODLE_COLORS[Math.floor(Math.random() * NOODLE_COLORS.length)];
      opts.add(`باكيت اندومي ${t === "كوب" ? "(كوب) " : ""}${c}`);
    }
    return shuffleArray([...opts]);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [idx]);

  const finishOrder = (success) => {
    if (doneRef.current) return;
    doneRef.current = true;
    let payAmt = 0;
    if (success) { payAmt = 20 + Math.round((timeLeft / timeLimit) * 20); earnedRef.current += payAmt; sounds.cash(); }
    else sounds.buzz();
    setLastPay(payAmt);
    setFeedback(success ? "done" : "missed");
    setTimeout(() => {
      if (idx + 1 < seq.length) { setIdx((i) => i + 1); setStep(0); }
      else onFinish(earnedRef.current, seq.length);
    }, 800);
  };

  const pickPacket = (label) => {
    if (label === correctLabel) { sounds.click(); setStep(1); } else { sounds.buzz(); }
  };

  useEffect(() => {
    doneRef.current = false;
    setTimeLeft(timeLimit);
    setFeedback(null);
    const timer = setInterval(() => {
      setTimeLeft((t) => {
        if (t <= 1) { clearInterval(timer); finishOrder(false); return 0; }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [idx]);

  return (
    <div className="space-y-3 text-center">
      <p className="text-sm text-[#AAAAAA]">طلب {idx + 1} من {seq.length}</p>
      <div className="w-full h-2 bg-[#2A2A2A] rounded-full overflow-hidden">
        <div className="h-full bg-[#F4A261] transition-all" style={{ width: `${(timeLeft / timeLimit) * 100}%` }} />
      </div>
      <p className="font-bold text-[#F5F5F5]">🍜 {current.customer} تريد: {correctLabel}</p>
      {feedback ? (
        <p className={`font-bold text-xl ${feedback === "done" ? "text-green-500" : "text-red-400"}`}>
          {feedback === "done" ? `جاهز! ربحت ${lastPay}$ 🍜` : "طفشت الطلب 😅"}
        </p>
      ) : step === 0 ? (
        <div className="grid grid-cols-2 gap-2">
          {packetChoices.map((label) => (
            <button key={label} onClick={() => pickPacket(label)}
              className="py-2.5 rounded-xl font-semibold text-[#F5F5F5] border-2 border-[#333333]">{label}</button>
          ))}
        </div>
      ) : step === 1 ? (
        <button onClick={() => { sounds.click(); setStep(2); }} className="w-full bg-[#F4A261] text-white font-bold py-3 rounded-xl">ضعه بصحن 🍜</button>
      ) : step === 2 ? (
        <button onClick={() => { sounds.splash(); setStep(3); }} className="w-full bg-[#F4A261] text-white font-bold py-3 rounded-xl">صب ماء ساخن 💧</button>
      ) : (
        <button onClick={() => finishOrder(true)} className="w-full bg-[#F4A261] text-white font-bold py-3 rounded-xl">أضف البهارات والصوص 🧂</button>
      )}
    </div>
  );
}

/* ---------------------------------- تحدي كسر الخزنة (لص) ---------------------------------- */

function ThiefGame({ rounds, sounds, onFinish }) {
  const [round, setRound] = useState(0);
  const [target, setTarget] = useState(() => 1 + Math.floor(Math.random() * 50));
  const [triesLeft, setTriesLeft] = useState(5);
  const [guess, setGuess] = useState("");
  const [hint, setHint] = useState("");
  const [feedback, setFeedback] = useState(null);
  const earnedRef = useRef(0);

  const nextRound = () => {
    if (round + 1 < rounds) {
      setRound((r) => r + 1);
      setTarget(1 + Math.floor(Math.random() * 50));
      setTriesLeft(5);
      setGuess(""); setHint(""); setFeedback(null);
    } else {
      onFinish(earnedRef.current, rounds);
    }
  };

  const submitGuess = () => {
    const g = parseInt(guess, 10);
    if (!g || feedback) return;
    if (g === target) {
      const pay = triesLeft * 15;
      earnedRef.current += pay;
      sounds.chime();
      setFeedback("success");
      setHint(`🔓 فتحتها! ربحت ${pay}$`);
      setTimeout(nextRound, 1000);
    } else {
      const left = triesLeft - 1;
      setTriesLeft(left);
      setGuess("");
      if (left <= 0) {
        sounds.buzz();
        setFeedback("fail");
        setHint(`🚨 فشلت! الرمز كان ${target}`);
        setTimeout(nextRound, 1200);
      } else {
        sounds.click();
        setHint(g < target ? "⬆️ الرمز أكبر من كذا" : "⬇️ الرمز أصغر من كذا");
      }
    }
  };

  return (
    <div className="space-y-3 text-center">
      <p className="text-base text-[#AAAAAA]">خزنة {round + 1} من {rounds} — المحاولات المتبقية: {triesLeft}</p>
      <p className="font-bold text-[#F5F5F5] text-3xl">🔐 خمّن رمز الخزنة (1-50)</p>
      {hint && <p className="text-[#F4A261] font-semibold">{hint}</p>}
      {!feedback && (
        <div className="flex gap-2">
          <input type="number" inputMode="numeric" value={guess} onChange={(e) => setGuess(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && submitGuess()}
            className="flex-1 border-2 border-[#333333] rounded-xl px-3 py-2 bg-[#242424] text-[#F5F5F5] outline-none focus:border-[#F4A261] text-center text-2xl" />
          <button onClick={submitGuess} className="bg-[#F4A261] text-[#1A1A1A] font-bold px-5 rounded-xl">خمّن</button>
        </div>
      )}
    </div>
  );
}

function LifeSimGame() {

  const [carriedItems, setCarriedItems] = useState({});

  const [ownedVehicles, setOwnedVehicles] = useState([]);
  const [activeVehicle, setActiveVehicle] = useState(null);

  const [hasCard, setHasCard] = useState(false);
  const [cardDebt, setCardDebt] = useState(0);
  const [creditLimit] = useState(2000);
  const [cardPayAmount, setCardPayAmount] = useState("");
  const [pendingPayment, setPendingPayment] = useState(null);
  const [pendingLibItem, setPendingLibItem] = useState(null);
  const [modal, setModal] = useState(null);
  const [estateFilter, setEstateFilter] = useState("all");
  const [toast, setToast] = useState(null);
  const [soundOn, setSoundOn] = useState(true);
  const [musicOn, setMusicOn] = useState(false);
  const [chatHistories, setChatHistories] = useState({ sara: [{ from: "npc", text: "أهلاً فيك! أنا سارة، جارتك 👋" }] });
  const [chatInput, setChatInput] = useState("");

  const { sounds, setEnabled, startMusic, stopMusic } = useSound();
  const REQ = { wood: 20, stone: 15, brick: 10 };

  /* ------------ تحميل/حفظ ------------ */
  useEffect(() => {
    (async () => {
      try {
        const raw = localStorage.getItem("life-sim-save-v3");
        if (raw) {
          const s = JSON.parse(raw);
          setCharacter(s.character); setMoney(s.money); setHouse(s.house);
          setPool(s.pool); setOwnedClothes(s.ownedClothes || ["casual"]);
          setInventory(s.inventory || {}); setItemRooms(s.itemRooms || {}); setCarriedItems(s.carriedItems || {}); setResources(s.resources || { wood: 0, stone: 0, brick: 0 });
          setOwnedVehicles((s.ownedVehicles || []).map((v) => {
            if (typeof v === "string") {
              const cat = ALL_VEHICLES.find((a) => a.id === v) || {};
              return { uid: v, id: v, name: cat.name || v, emoji: cat.emoji || "🚗", color: null, price: cat.price || 0 };
            }
            return v;
          }));
          setActiveVehicle(s.activeVehicle || null);
          setBankBalance(s.bankBalance || 0);
          setHasCard(s.hasCard || false); setCardDebt(s.cardDebt || 0);
          setChatHistories(s.chatHistories || { sara: [{ from: "npc", text: "أهلاً فيك! أنا سارة، جارتك 👋" }] });
          setStage(s.house ? "world" : "create");
        } else {
          setStage("intro");
        }
      } catch (e) { setStage("intro"); }
    })();
  }, []);

  useEffect(() => {
    if (stage !== "world" && stage !== "build" && stage !== "chooseHouse") return;
    const t = setTimeout(() => {
      const state = { character, money, house, pool, ownedClothes, inventory, itemRooms, carriedItems, resources, ownedVehicles, activeVehicle, chatHistories, bankBalance, hasCard, cardDebt };
      localStorage.setItem("life-sim-save-v3", JSON.stringify(state));
    }, 400);
    return () => clearTimeout(t);
  }, [character, money, house, pool, ownedClothes, inventory, itemRooms, carriedItems, resources, ownedVehicles, activeVehicle, chatHistories, bankBalance, hasCard, cardDebt, stage]);

  useEffect(() => { setEnabled(soundOn); }, [soundOn]);
  useEffect(() => { musicOn ? startMusic() : stopMusic(); }, [musicOn]);
  useEffect(() => { if (toast) { const t = setTimeout(() => setToast(null), 1900); return () => clearTimeout(t); } }, [toast]);

  /* ------------ إجراءات عامة ------------ */

  const buyHouse = (h) => {
    if (money < h.price) { setToast("ما عندك فلوس كافية 😅"); return; }
    setMoney((m) => m - h.price);
    setHouse({ id: h.id, name: h.name, emoji: h.emoji, custom: false, bedrooms: h.bedrooms, area: h.area, features: h.features });
    sounds.cash(); setStage("world"); setToast(`مبروك بيتك الجديد: ${h.name}!`);
  };

  const gather = (res) => { setResources((r) => ({ ...r, [res]: r[res] + 1 })); sounds.click(); };

  const finishBuild = () => {
    setHouse({ id: "custom", name: "منزل بنيته بنفسي", emoji: "🏗️🏠", custom: true });
    sounds.chime(); setStage("world"); setToast("مبروك! بنيت بيتك بيدك 🎉");
  };

  const requestPayment = (price, label, onSuccess) => {
    setPendingPayment({ price, label, onSuccess });
  };

  const buyItem = (itemName, price) => {
    requestPayment(price, itemName, () => {
      if (itemName.includes("مسبح")) setPool(true);
      setCarriedItems((inv) => ({ ...inv, [itemName]: (inv[itemName] || 0) + 1 }));
      setToast(`اشتريت: ${itemName} ✅ (بحقيبتك الآن)`);
    });
  };

  const unpackBag = () => {
    const carriedCount = Object.values(carriedItems).reduce((a, b) => a + b, 0);
    if (carriedCount > 0) {
      setInventory((inv) => {
        const merged = { ...inv };
        Object.entries(carriedItems).forEach(([k, v]) => { merged[k] = (merged[k] || 0) + v; });
        return merged;
      });
      setCarriedItems({});
      sounds.door();
      setToast("رجعت البيت ورتبت أغراضك 🏠📦");
    }
  };

  const discardItem = (name) => {
    setInventory((inv) => {

  const sellVehicle = (uid) => {

  if (stage === "create") {

                  return (
                    <>
                      <p className="text-base font-semibold text-[#F5F5F5] pt-2">أغراضي بالبيت (رتّبها بالغرف)</p>
                      <div className="space-y-3">
                        {order.filter((rid) => groups[rid]).map((rid) => {
                          const roomInfo = ALL_ROOMS.find((r) => r.id === rid);
                          return (
                            <div key={rid}>
                              <p className="text-sm font-bold text-[#F4A261] mb-1 text-right">
                                {rid === "unsorted" ? "🗂️ غير مرتب" : `${roomInfo.emoji} ${roomInfo.name}`}
                              </p>
                              <div className="space-y-1.5">
                                {groups[rid].map(([name, qty]) => (
                                  <div key={name} className="flex justify-between items-center gap-2 bg-[#242424] rounded-xl px-3 py-2">
                                    <span className="text-base font-medium text-[#F5F5F5] flex-1">{name} (x{qty})</span>
                                    <select value={itemRooms[name] || ""} onChange={(e) => assignRoom(name, e.target.value)}
                                      className="bg-[#1A1A1A] text-[#F5F5F5] text-sm rounded-lg border border-[#333333] px-1.5 py-1">
                                      <option value="">ضعه في...</option>
                                      {rooms.map((r) => (
                                        <option key={r.id} value={r.id}>{r.emoji} {r.name}</option>
                                      ))}
                                    </select>
                                    <button onClick={() => discardItem(name)} className="text-xl">🗑️</button>
                                  </div>
                                ))}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </>
                  );
                })()}

                <p className="text-base font-semibold text-[#F5F5F5] pt-2">خزانة الملابس</p>
                <div className="flex gap-2 flex-wrap justify-center">
                  {CLOTHES.map((c) => (
                    <button key={c.id} onClick={() => buyClothes(c)}
                      className={`px-3 py-2 rounded-xl border-2 text-base font-medium ${character.outfit === c.id ? "bg-[#F4A261] border-[#F4A261] text-white" : "border-[#333333] text-[#F5F5F5]"}`}>
                      {c.emoji} {c.name}{!ownedClothes.includes(c.id) ? ` (${c.price}$)` : ""}
                    </button>
                  ))}
                </div>
                {ownedVehicles.length > 0 && (
                  <>
                    <p className="text-base font-semibold text-[#F5F5F5] pt-2">مركباتي</p>
                    <div className="space-y-1.5">
                      {ownedVehicles.map((v) => {
                        const active = activeVehicle === v.uid;
                        return (
                          <div key={v.uid} className="flex justify-between items-center bg-[#242424] rounded-xl px-3 py-2">
                            <button onClick={() => setActiveVehicle(v.uid)}
                              className={`px-3 py-1.5 rounded-lg text-base font-medium ${active ? "bg-[#F4A261] text-white" : "border-2 border-[#333333] text-[#F5F5F5]"}`}>
                              {v.emoji} {v.name}{v.color ? ` (${v.color})` : ""}
                            </button>
                            <button onClick={() => sellVehicle(v.uid)} className="text-base font-bold text-red-500 px-2">بيع (${Math.round(v.price * 0.5)})</button>
                          </div>
                        );
                      })}
                    </div>
                  </>
                )}
              </div>
            )}

            {modal.type === "schoolChoice" && (
              <div className="space-y-2">
                <button onClick={() => setModal({ type: "quiz", pool: QUIZ_QUESTIONS, rounds: 4, payPerCorrect: 25, title: "واجب المدرسة" })}
                  className="w-full flex items-center gap-3 bg-[#242424] rounded-xl px-4 py-3 text-right">
                  <span className="text-4xl">📚</span><span className="font-semibold text-[#F5F5F5]">ادرس كطالب</span>
                </button>
                <button onClick={() => setModal({ type: "quiz", pool: QUIZ_QUESTIONS, rounds: 5, payPerCorrect: 40, title: "التدريس بالمدرسة" })}
                  className="w-full flex items-center gap-3 bg-[#242424] rounded-xl px-4 py-3 text-right">
                  <span className="text-4xl">🍎</span><span className="font-semibold text-[#F5F5F5]">اعمل كمعلّم</span>
                </button>
              </div>
            )}

            {modal.type === "sellHouse" && house && (() => {
              const basePrice = HOUSES.find((h) => h.id === house.id)?.price || 2000;
              const offers = shuffleArray(BUYER_NAMES).slice(0, 3).map((name) => ({
                name, price: Math.round(basePrice * (0.7 + Math.random() * 0.6)),
              }));
              return (
                <div className="space-y-2">
                  <p className="text-base text-[#AAAAAA] text-center mb-1">عروض المشترين على {house.name}</p>
                  {offers.map((o, i) => (
                    <button key={i} onClick={() => acceptHouseOffer(o.price)}
                      className="w-full flex justify-between items-center bg-[#242424] rounded-xl px-4 py-3">
                      <span className="font-medium text-[#F5F5F5]">{o.name}</span>
                      <span className="font-bold text-green-700">{o.price}$</span>
                    </button>
                  ))}
                </div>
              );
            })()}

            {modal.type === "shop" && (
              <div className="space-y-2">
                {["cafe", "restaurant", "supermarket"].includes(modal.key) && (
                  <p className="text-sm text-[#888888] text-center -mt-1 mb-1">🛍️ اشترِ بنفسك أو 🛵 اطلب توصيل لبيتك (+5$)</p>
                )}
                {SHOPS[modal.key].items.map(([name, price]) => {
                  const needsColor = modal.key === "library" && NOTEBOOK_ITEMS.includes(name);
                  if (needsColor && pendingLibItem?.name === name) {
                    return (
                      <div key={name} className="bg-[#242424] rounded-xl p-3 space-y-2">
                        <p className="text-sm text-[#AAAAAA]">اختر لون {name}:</p>
                        <div className="flex gap-2 flex-wrap">
                          {CAR_COLORS.map((col) => (
                            <button key={col} onClick={() => { buyItem(`${name} (${col})`, price); setPendingLibItem(null); }}
                              className="px-3 py-1.5 rounded-lg text-sm font-bold bg-[#1A1A1A] border-2 border-[#333333] text-[#F5F5F5]">
                              {col}
                            </button>
                          ))}
                          <button onClick={() => setPendingLibItem(null)} className="px-3 py-1.5 rounded-lg text-sm text-[#888888] underline">إلغاء</button>
                        </div>
                      </div>
                    );
                  }
                  return (
                    <div key={name} className="w-full flex items-center gap-2">
                      <button onClick={() => needsColor ? setPendingLibItem({ name, price }) : buyItem(name, price)}
                        className="flex-1 flex justify-between items-center bg-[#242424] hover:bg-[#2A2A2A] rounded-xl px-4 py-2.5">
                        <span className="font-medium text-[#F5F5F5]">{name} {inventory[name] ? `(x${inventory[name]})` : ""}</span>
                        <span className="font-bold text-green-700">{price}$</span>
                      </button>
                      {["cafe", "restaurant", "supermarket"].includes(modal.key) && (
                        <button onClick={() => orderDelivery(name, price, SHOPS[modal.key].name)}
                          title="اطلب توصيل" className="shrink-0 bg-[#F4A261] text-white rounded-xl px-3 py-2.5 font-bold">
                          🛵
                        </button>
                      )}
                    </div>
                  );
                })}
                {["cafe", "restaurant", "supermarket", "salon", "pharmacy"].includes(modal.key) && (
                  <button onClick={() => setModal({ type: "serve", key: modal.key, shopName: SHOPS[modal.key].name })}
                    className="w-full bg-[#F4A261] text-white font-bold py-2.5 rounded-xl mt-2">
                    اعمل هنا وقدّم الطلبات 🧑‍🍳
                  </button>
                )}
              </div>
            )}

            {modal.type === "quiz" && (
              <QuizGame pool={modal.pool} rounds={modal.rounds} payPerCorrect={modal.payPerCorrect} sounds={sounds}
                onFinish={(earned, correct, total) => {
                  setMoney((m) => m + earned);
                  setToast(`أحسنت! أجبت ${correct}/${total} صح، ربحت ${earned}$`);
                  setTimeout(() => setModal(null), 300);
                }} />
            )}

            {modal.type === "serve" && (
              <ServeGame items={SHOPS[modal.key].items} rounds={5} timeLimit={60} sounds={sounds}
                onFinish={(earned, total) => {
                  setMoney((m) => m + earned);
                  setToast(`خلصت الدوام! قدمت ${total} طلبات وربحت ${earned}$`);
                  setTimeout(() => setModal(null), 300);
                }} />
            )}

            {modal.type === "vehicle" && (
              colorPickerFor ? (
                <div className="space-y-3 text-center">
                  <p className="text-lg font-bold text-[#F5F5F5]">اختر لون {colorPickerFor.name}</p>
                  <div className="grid grid-cols-2 gap-2">
                    {CAR_COLORS.map((color) => (
                      <button key={color} onClick={() => buyVehicle(colorPickerFor, color)}
                        className="py-3 rounded-xl font-semibold text-[#F5F5F5] border-2 border-[#333333] bg-[#242424]">
                        {color}
                      </button>
                    ))}
                  </div>
                  <button onClick={() => setColorPickerFor(null)} className="text-[#AAAAAA] underline text-base">رجوع</button>
                </div>
              ) : (
                <div className="space-y-2">
                  {VEHICLES_BY_ZONE[modal.key].map((v) => {
                    const count = ownedVehicles.filter((x) => x.id === v.id).length;
                    return (
                      <div key={v.id} className="flex justify-between items-center bg-[#242424] rounded-xl px-4 py-2.5">
                        <span className="font-medium text-[#F5F5F5]">{v.emoji} {v.name}{count > 0 ? ` (لديك ${count})` : ""}</span>
                        <button onClick={() => v.needsColor ? setColorPickerFor(v) : buyVehicle(v)}
                          className="px-3 py-1.5 rounded-lg font-bold text-base bg-[#F4A261] text-white">{v.price}$</button>
                      </div>
                    );
                  })}
                  <p className="text-sm text-[#888888] text-center pt-1">إدارة مركباتك المملوكة (تفعيل/بيع) من داخل المنزل 🏠</p>
                </div>
              )
            )}

            {modal.type === "realEstate" && (
              <div className="space-y-3">
                <p className="text-base text-[#AAAAAA] text-center">رصيدك: {money}$ 💰</p>
                <div className="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1">
                  {ESTATE_FILTERS.map((f) => (
                    <button key={f.id} onClick={() => setEstateFilter(f.id)}
                      className={`shrink-0 px-3 py-1.5 rounded-full text-base font-bold whitespace-nowrap ${estateFilter === f.id ? "bg-[#F4A261] text-white" : "bg-[#242424] text-[#F5F5F5]"}`}>
                      {f.label}
                    </button>
                  ))}
                </div>
                <div className="space-y-2">
                  {HOUSES.filter(ESTATE_FILTERS.find((f) => f.id === estateFilter).test).map((h) => (
                    <div key={h.id} className="bg-[#242424] rounded-2xl p-3">
                      <div className="flex items-center gap-3">
                        <span className="text-5xl">{h.emoji}</span>
                        <div className="flex-1">
                          <p className="font-bold text-[#F5F5F5] text-base">{h.name}</p>
                          <p className="text-base text-[#999999]">{h.desc}</p>
                          <p className="text-base text-[#888888] mt-0.5">🛏️ {h.bedrooms} غرف · 📐 {h.area} م²{h.features.length > 0 ? ` · ${h.features.join("، ")}` : ""}</p>
                        </div>
                      </div>
                      <div className="flex items-center justify-between mt-2">
                        <span className={`font-bold text-base ${money >= h.price ? "text-green-600" : "text-red-500"}`}>{h.price}$</span>
                        <button onClick={() => buyHouseFromMarket(h)}
                          className="bg-[#F4A261] text-white text-base font-bold px-4 py-1.5 rounded-lg">اشترِ</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {modal.type === "delivery" && (
              <DeliveryGame rounds={5} timeLimit={60} sounds={sounds}
                onFinish={(earned, total) => {
                  setMoney((m) => m + earned);
                  setToast(`خلصت الديلفري! وصّلت ${total} طلبات وربحت ${earned}$`);
                  setTimeout(() => setModal(null), 300);
                }} />
            )}

            {modal.type === "thief" && (
              <ThiefGame rounds={4} sounds={sounds}
                onFinish={(earned, total) => {
                  setMoney((m) => m + earned);
                  setToast(`خلصت التحدي! جربت ${total} خزائن وربحت ${earned}$`);
                  setTimeout(() => setModal(null), 300);
                }} />
            )}

            {modal.type === "noodle" && (
              <NoodleGame rounds={5} timeLimit={60} sounds={sounds}
                onFinish={(earned, total) => {
                  setMoney((m) => m + earned);
                  setToast(`خلصت الدوام! حضّرت ${total} طلبات وربحت ${earned}$`);
                  setTimeout(() => setModal(null), 300);
                }} />
            )}

            {modal.type === "gymChoice" && (
              <div className="space-y-2">
                <button onClick={() => { sounds.click(); setToast("تمرين رائع! حسّيت بنشاط 💪"); closeModal(); }}
                  className="w-full flex items-center gap-3 bg-[#242424] rounded-xl px-4 py-3 text-right">
                  <span className="text-3xl">💪</span><span className="font-semibold text-[#F5F5F5]">تمرّن</span>
                </button>
                <button onClick={() => setModal({ type: "quiz", pool: QUIZ_QUESTIONS, rounds: 4, payPerCorrect: 35, title: "العمل كمدرب لياقة" })}
                  className="w-full flex items-center gap-3 bg-[#242424] rounded-xl px-4 py-3 text-right">
                  <span className="text-3xl">🏋️</span><span className="font-semibold text-[#F5F5F5]">اعمل كمدرب</span>
                </button>
              </div>
            )}

            {modal.type === "airport" && (
              airportPick ? (
                <div className="space-y-3 text-center">
                  <div className="text-5xl">{airportPick.emoji}</div>
                  <p className="font-bold text-[#F5F5F5] text-xl">{airportPick.name}</p>
                  <p className="text-base text-[#AAAAAA]">اختر عدد المسافرين</p>
                  <div className="flex gap-2 justify-center">
                    {[1, 2].map((n) => (
                      <button key={n} onClick={() => setTravelCount(n)}
                        className={`px-5 py-2 rounded-xl font-bold ${travelCount === n ? "bg-[#F4A261] text-white" : "border-2 border-[#333333] text-[#F5F5F5]"}`}>
                        {n} {n > 1 ? "مسافرين" : "مسافر"}
                      </button>
                    ))}
                  </div>
                  <p className="font-bold text-lg text-[#F5F5F5]">الإجمالي: {airportPick.price * travelCount}$</p>
                  <button onClick={buyTicket} className="w-full bg-[#F4A261] text-white font-bold py-3 rounded-xl">اشترِ التذكرة ✈️</button>
                  <button onClick={() => setAirportPick(null)} className="text-[#AAAAAA] underline text-base">رجوع لقائمة الوجهات</button>
                </div>
              ) : (
                <div className="space-y-1.5">
                  <p className="text-sm text-[#888888] text-center mb-1">رصيدك: {money}$ 💰</p>
                  {AIRPORT_DESTINATIONS.map((d) => (
                    <button key={d.id} onClick={() => { setAirportPick(d); setTravelCount(1); }}
                      className="w-full flex justify-between items-center bg-[#242424] rounded-xl px-4 py-2.5">
                      <span className="font-medium text-[#F5F5F5]">{d.emoji} {d.name}</span>
                      <span className="font-bold text-green-500">{d.price}$</span>
                    </button>
                  ))}
                </div>
              )
            )}

            {modal.type === "bank" && (
              <div className="space-y-4 text-center">
                <div className="grid grid-cols-2 gap-2">
                  <div className="bg-[#242424] rounded-xl p-3">
                    <p className="text-base text-[#AAAAAA]">النقود معك</p>
                    <p className="font-bold text-2xl text-[#F5F5F5]">{money}$</p>
                  </div>
                  <div className="bg-[#242424] rounded-xl p-3">
                    <p className="text-base text-[#AAAAAA]">رصيدك بالبنك</p>
                    <p className="font-bold text-2xl text-[#2A9D8F]">{bankBalance}$</p>
                  </div>
                </div>
                <input type="number" inputMode="numeric" value={bankAmount} onChange={(e) => setBankAmount(e.target.value)}
                  placeholder="اكتب المبلغ..." className="w-full border-2 border-[#333333] rounded-xl px-3 py-2 outline-none focus:border-[#F4A261] text-center" />
                <div className="flex gap-2">
                  <button onClick={deposit} className="flex-1 bg-[#2A9D8F] text-white font-bold py-2.5 rounded-xl">إيداع بالبنك</button>
                  <button onClick={withdraw} className="flex-1 bg-[#F4A261] text-[#F5F5F5] font-bold py-2.5 rounded-xl">سحب نقود</button>
                </div>

                <div className="border-t border-[#333333] pt-4">
                  {!hasCard ? (
                    <div className="space-y-2">
                      <p className="text-base text-[#AAAAAA]">ما عندك بطاقة فيزا بعد</p>
                      <button onClick={applyForCard} className="w-full bg-gradient-to-l from-[#4A00E0] to-[#8E2DE2] text-white font-bold py-2.5 rounded-xl">
                        💳 اطلب بطاقة فيزا (حد ائتماني {creditLimit}$)
                      </button>
                    </div>
                  ) : (
                    <div className="space-y-2">
                      <div className="bg-gradient-to-l from-[#4A00E0] to-[#8E2DE2] rounded-2xl p-4 text-white text-right">
                        <p className="text-sm opacity-80">بطاقة فيزا 💳</p>
                        <p className="text-xl font-bold mt-1">المتاح: {creditLimit - cardDebt}$</p>
                        <p className="text-sm opacity-80 mt-1">المستخدم: {cardDebt}$ من {creditLimit}$</p>
                      </div>
                      {cardDebt > 0 && (
                        <>
                          <input type="number" inputMode="numeric" value={cardPayAmount} onChange={(e) => setCardPayAmount(e.target.value)}
                            placeholder="مبلغ السداد..." className="w-full border-2 border-[#333333] rounded-xl px-3 py-2 outline-none focus:border-[#F4A261] text-center" />
                          <button onClick={payCard} className="w-full bg-[#2A9D8F] text-white font-bold py-2.5 rounded-xl">سداد من الفيزا</button>
                        </>
                      )}
                    </div>
                  )}
                </div>
              </div>
            )}

            {modal.type === "chat" && (
              <div>
                <div className="h-56 overflow-y-auto space-y-2 mb-3 bg-[#242424] rounded-xl p-3">
                  {(chatHistories[modal.botId] || []).map((m, i) => (
                    <div key={i} className={`max-w-[80%] px-3 py-2 rounded-2xl text-base ${m.from === "me" ? "bg-[#F4A261] text-white mr-auto" : "bg-[#1A1A1A] ml-auto shadow"}`}>
                      {m.text}
                    </div>
                  ))}
                </div>
                <div className="flex gap-2">
                  <input value={chatInput} onChange={(e) => setChatInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && sendChat(modal.botId)}
                    placeholder="اكتب رسالة..." className="flex-1 border-2 border-[#333333] rounded-xl px-3 py-2 outline-none focus:border-[#F4A261]" />
                  <button onClick={() => sendChat(modal.botId)} className="bg-[#F4A261] text-white px-4 rounded-xl font-bold">إرسال</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function Shell({ children }) {
  return (
    <div dir="rtl" className="w-full min-h-screen bg-black flex items-center justify-center py-10 font-sans">
      {children}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<LifeSimGame />);
</script>
</body>
</html>
